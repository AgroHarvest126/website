<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroHarvest — датчик, который питается землёй</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<!-- model-viewer: веб-компонент Google для интерактивных 3D-моделей (.glb) -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
/* ============================================================
   AGROHARVEST — ДИЗАЙН-СИСТЕМА И СТИЛИ
   ============================================================ */
:root{
  --deep-soil:#0B0D0A;
  --charcoal:#14170F;
  --bio:#B4FF39;
  --bio-dim: rgba(180,255,57,0.4);
  --copper:#D97A3D;
  --off-white:#F4F2EA;
  --stone:#8C9184;
  --bone:#F4F2EA;
  --ink:#101210;
  --hairline-dark:#2A2E23;
  --hairline-light:#DDD8C8;
  --rust:#C1441E;

  --font-display:'Inter Tight', Inter, sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'JetBrains Mono', monospace;

  --radius-sm:8px;
  --radius-md:16px;
  --radius-lg:24px;
  --radius-pill:100px;

  --section-pad: 120px;
}

*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--deep-soil);
  color:var(--off-white);
  font-family:var(--font-body);
  font-size:16px;
  line-height:1.6;
  overflow-x:hidden;
}
img, svg{max-width:100%; display:block;}
a{color:inherit; text-decoration:none;}
ul{list-style:none;}

h1,h2,h3,h4{
  font-family:var(--font-display);
  font-weight:600;
  letter-spacing:-0.02em;
  line-height:1.05;
}
h1{font-size:clamp(40px, 6vw, 88px); line-height:1.02; letter-spacing:-0.03em;}
h2{font-size:clamp(32px, 4.5vw, 56px); margin-bottom: 24px;}
h3{font-size:clamp(22px, 2.5vw, 32px); font-weight:500; margin-bottom: 16px;}
h4{font-size:20px; font-weight:500; margin-bottom: 12px;}

.eyebrow{
  font-family:var(--font-mono);
  font-size:13px;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--bio);
  display:inline-block;
  margin-bottom:16px;
}
.section-light .eyebrow { color: var(--rust); }

.section{
  padding:var(--section-pad) 8vw;
  position:relative;
}
.section-light{ background:var(--bone); color:var(--ink); }
.section-dark-alt{ background:var(--charcoal); }

.container{max-width:1280px; margin:0 auto;}

.subtitle{
  font-size:clamp(17px, 1.3vw, 20px);
  color:var(--stone);
  max-width:640px;
  margin-top:20px;
}
.section-light .subtitle{ color:#5b5f54; }

/* ---------- BUTTONS ---------- */
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  height:54px;
  padding:0 32px;
  border-radius:var(--radius-pill);
  font-family:var(--font-body);
  font-weight:600;
  font-size:15px;
  cursor:pointer;
  border:1px solid transparent;
  transition:transform .25s ease, box-shadow .25s ease, background .25s ease, color .25s ease;
  white-space:nowrap;
}
.btn-primary{
  background:var(--bio);
  color:var(--ink);
}
.btn-primary:hover{
  transform:scale(1.03);
  box-shadow:0 0 32px var(--bio-dim);
}
.btn-secondary{
  background:transparent;
  color:var(--off-white);
  border:1px solid var(--hairline-dark);
}
.section-light .btn-secondary{ color:var(--ink); border-color:var(--hairline-light); }
.btn-secondary:hover{ background:var(--charcoal); }
.section-light .btn-secondary:hover{ background:#e9e5d6; }

.cta-row{ display:flex; gap:16px; flex-wrap:wrap; margin-top:40px; }

/* ---------- HEADER ---------- */
header{
  position:fixed;
  top:0; left:0; right:0;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 8vw;
  transition:background .3s ease, backdrop-filter .3s ease, border-color .3s ease;
  border-bottom:1px solid transparent;
}
header.scrolled{
  background:rgba(20,23,15,0.75);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--hairline-dark);
}
.logo{
  font-family:var(--font-display);
  font-weight:700;
  font-size:20px;
  letter-spacing:-0.01em;
  display:flex; align-items:center; gap:10px;
}
.logo-mark{
  width:24px; height:24px;
  border-radius:6px;
  background:var(--bio);
  flex-shrink: 0;
}
nav{ display:flex; align-items:center; gap:36px; }
.nav-links{ display:flex; gap:32px; font-size:14px; font-weight:500; color:var(--stone); }
.nav-links a:hover{ color:var(--off-white); }
.mobile-toggle{ display:none; background:none; border:none; color:var(--off-white); font-size:24px; cursor:pointer; }

@media (max-width:900px){
  .nav-links, header .btn{ display:none; }
  .mobile-toggle{ display:block; }
}

/* ---------- HERO ---------- */
#hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  padding-top:120px;
  position:relative;
  overflow:hidden;
}
.hero-grid{
  display:grid;
  grid-template-columns:1.1fr 1fr;
  gap:60px;
  align-items:center;
  position:relative;
  z-index:2;
  width:100%;
}
@media (max-width:900px){ .hero-grid{ grid-template-columns:1fr; } }

.hero-copy .reveal-line{
  overflow:hidden;
  margin-bottom: 8px;
}
.hero-copy .reveal-line span{
  display:inline-block;
  transform:translateY(110%);
  opacity:0;
  transition:transform .7s cubic-bezier(.16,1,.3,1), opacity .7s ease;
}
.hero-copy.in-view .reveal-line span{ transform:translateY(0); opacity:1; }
.hero-copy .reveal-line:nth-child(1) span{ transition-delay:.05s; }
.hero-copy .reveal-line:nth-child(2) span{ transition-delay:.15s; }

.hero-stage{
  position:relative;
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
}
.img-placeholder{
  width:100%; height:100%;
  min-height:280px;
  border-radius:var(--radius-lg);
  border:1px dashed var(--hairline-dark);
  background:linear-gradient(135deg, rgba(180,255,57,0.06), rgba(217,122,61,0.05));
  display:flex; align-items:center; justify-content:center;
  flex-direction:column;
  gap:8px;
  text-align:center;
  padding:24px;
  color:var(--stone);
  font-size:13px;
  line-height:1.5;
}
.section-light .img-placeholder{ border-color:var(--hairline-light); color:#7a7d70; }
.img-placeholder .tag{
  font-family:var(--font-mono);
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.06em;
  color:var(--copper);
}

.media-box{
  width:100%; height:100%;
  border-radius:var(--radius-lg);
  overflow:hidden;
  position:relative;
  min-height:280px;
}
.media-box model-viewer{
  width:100%; height:100%;
  min-height:350px;
  --poster-color:transparent;
  background:transparent;
}
.hero-stage model-viewer{ min-height:420px; }

.hero-metric{
  margin-top:56px;
  display:flex;
  align-items:center;
  gap:16px;
  font-family:var(--font-mono);
  font-size:14px;
  color:var(--stone);
  border-top:1px solid var(--hairline-dark);
  padding-top:24px;
  max-width:520px;
}
.hero-metric b{ color:var(--bio); font-size:20px; }

/* ---------- PROBLEM SECTION ---------- */
.problem-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px;
  margin-top:64px;
}
@media (max-width:900px){ .problem-grid{ grid-template-columns:1fr; } }

.card{
  background:var(--charcoal);
  border: 1px solid var(--hairline-dark);
  border-radius: var(--radius-md);
  padding: 40px;
  transition: transform 0.3s ease, border-color 0.3s ease;
}
.card:hover {
  transform: translateY(-5px);
  border-color: var(--bio-dim);
}
.card .card-icon {
  font-size: 32px;
  margin-bottom: 24px;
  color: var(--copper);
}
.card p {
  color: var(--stone);
}

/* ---------- HOW IT WORKS ---------- */
.steps-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 40px;
  margin-top: 64px;
  align-items: center;
}
@media (max-width: 900px) { .steps-grid { grid-template-columns: 1fr; } }

.step-list {
  display: flex;
  flex-direction: column;
  gap: 32px;
}
.step-item {
  display: flex;
  gap: 24px;
}
.step-num {
  font-family: var(--font-mono);
  color: var(--rust);
  font-weight: 600;
  font-size: 20px;
}

/* ---------- CALC COEF ---------- */
.calc-box {
  background: var(--deep-soil);
  color: var(--off-white);
  padding: 40px;
  border-radius: var(--radius-lg);
  margin-top: 44px;
  border: 1px solid var(--hairline-dark);
}
.range-group {
  margin-bottom: 32px;
}
.range-group label {
  display: block;
  font-family: var(--font-mono);
  font-size: 14px;
  margin-bottom: 12px;
}
.range-group input[type="range"] {
  width: 100%;
  accent-color: var(--bio);
}
.result-display {
  font-family: var(--font-display);
  font-size: clamp(24px, 3vw, 40px);
  color: var(--bio);
  font-weight: 700;
  border-top: 1px solid var(--hairline-dark);
  padding-top: 24px;
}

/* ---------- FOOTER ---------- */
footer {
  padding: 60px 8vw;
  border-top: 1px solid var(--hairline-dark);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 24px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--stone);
}
</style>
</head>
<body>

  <!-- НАВИГАЦИЯ -->
  <header id="header">
    <div class="logo">
      <div class="logo-mark"></div>
      <span>AgroHarvest</span>
    </div>
    <nav>
      <div class="nav-links">
        <a href="#problems">Проблемы</a>
        <a href="#solution">Технология</a>
        <a href="#calc">Окупаемость</a>
      </div>
      <a href="#calc" class="btn btn-secondary" style="height:40px; padding:0 20px; font-size:13px;">Заказать тест</a>
    </nav>
    <button class="mobile-toggle">≡</button>
  </header>

  <!-- ГЛАВНЫЙ ЭКРАН -->
  <section id="hero" class="section">
    <div class="container hero-grid">
      <div class="hero-copy in-view">
        <span class="eyebrow">Запущена генерация энергии из почвы</span>
        <div class="reveal-line"><h1>Датчик, который</h1></div>
        <div class="reveal-line"><h1>питается землёй.</h1></div>
